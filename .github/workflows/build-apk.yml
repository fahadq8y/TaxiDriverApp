name: Build & Release APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'اسم الإصدار (مثلاً v2.4.4 أو "fix-tracking")'
        required: false
        default: ''

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_NUMBER=${{ github.run_number }}
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-build${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find android/app/build/outputs -type f
            exit 1
          fi
          NEW_NAME="WhiteHorse-Driver-v${{ steps.version.outputs.app_version }}-build${{ steps.version.outputs.build_number }}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "apk_path=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$(du -h "$NEW_NAME" | cut -f1)" >> $GITHUB_OUTPUT
          ls -lh "$NEW_NAME"

      - name: Upload APK artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: WhiteHorse-Driver-APK
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: White Horse Driver v${{ steps.version.outputs.app_version }} (build ${{ steps.version.outputs.build_number }})
          body: |
            ## 📲 تطبيق السائق — White Horse

            **الإصدار:** ${{ steps.version.outputs.app_version }}
            **رقم البناء:** ${{ steps.version.outputs.build_number }}
            **حجم الملف:** ${{ steps.apk.outputs.apk_size }}
            **commit:** ${{ steps.version.outputs.short_sha }}

            ### 📥 كيف تنزل؟
            اضغط على **WhiteHorse-Driver-v*.apk** في الأسفل ↓

            ### 📲 كيف تركبه على جوال السائق؟
            1. حمّل ملف APK على جوال السائق
            2. افتح الملف من المتصفح أو من قسم التحميلات
            3. لو ظهرت رسالة "حظر التثبيت من مصادر غير معروفة":
               - اضغط "الإعدادات"
               - فعّل "السماح من هذا المصدر"
               - ارجع وكمل التثبيت
            4. إذا كان فيه إصدار قديم، التطبيق راح يحدّث تلقائياً
               (نفس الـ keystore = نفس التوقيع = ما يحتاج إلغاء تثبيت)

            ### ⚠️ ملاحظات
            - الإصدار الحالي يحل مشكلة الـ 8.5 مليون سجل موقع
            - distanceFilter محدّث (30 متر بدل كل ثانية)
            - heartbeat كل دقيقة لمنع false alerts
            - استهلاك بطارية أقل + Firestore writes أقل

            ### 🔧 للمطورين
            - بُني تلقائياً من commit `${{ steps.version.outputs.short_sha }}`
            - workflow: [Build & Release APK](../../actions/workflows/build-apk.yml)
          files: ${{ steps.apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## ✅ تم بناء APK بنجاح" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **الإصدار:** v${{ steps.version.outputs.app_version }} (build ${{ steps.version.outputs.build_number }})" >> $GITHUB_STEP_SUMMARY
          echo "- **الحجم:** ${{ steps.apk.outputs.apk_size }}" >> $GITHUB_STEP_SUMMARY
          echo "- **الاسم:** ${{ steps.apk.outputs.apk_path }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 رابط التحميل" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          
